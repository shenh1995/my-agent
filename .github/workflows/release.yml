name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: linux-x86_64
            artifact_name: my_claude
          # macOS x86_64 (Intel)
          - os: macos-13
            target: macos-x86_64
            artifact_name: my_claude
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            target: macos-arm64
            artifact_name: my_claude
          # Windows x86_64
          - os: windows-latest
            target: windows-x86_64
            artifact_name: my_claude.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller>=6.0.0
          pip install -e .

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Linux
          cp artifacts/linux-x86_64/my_claude release/my_claude-linux-x86_64
          chmod +x release/my_claude-linux-x86_64
          # macOS Intel
          cp artifacts/macos-x86_64/my_claude release/my_claude-macos-x86_64
          chmod +x release/my_claude-macos-x86_64
          # macOS Apple Silicon
          cp artifacts/macos-arm64/my_claude release/my_claude-macos-arm64
          chmod +x release/my_claude-macos-arm64
          # Windows
          cp artifacts/windows-x86_64/my_claude.exe release/my_claude-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true